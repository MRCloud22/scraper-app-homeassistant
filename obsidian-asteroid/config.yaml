name: "Termine Scraper Beautykuppel"
description: "application that scrapes appointments for Beautykuppel."
version: "1.0.0"
slug: "obsidian_asteroid"
url: "https://github.com/MRCloud22/scraper-app-homeassistant"
init: false
addon_config: true
map:
  - config:rw
arch:
  - aarch64
  - amd64
  - armv7
ports:
  3000/tcp: 3000
ports_description:
  3000/tcp: "Web interface for the Next.js App"
options:
  enable_ftp: false
  ftp_server: ""
  ftp_user: ""
  ftp_password: ""
  ftp_port: 21
  ftp_remote_path: "/"
  sync_interval: 60
schema:
  enable_ftp: bool
  ftp_server: str
  ftp_user: str?
  ftp_password: password?
  ftp_port: int(1,65535)
  ftp_remote_path: str
  sync_interval: int(5,1440)
startup: "services"
boot: "auto"
